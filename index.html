<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Pro | Student Enrollment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://login2explore.com/jpdb/resources/js/0.0.3/jpdb-commons.js"></script>
</head>
<body>
    <div id="alert-container"></div>

    <div class="infinity-bg">
        <div class="cyber-grid"></div>
        <div class="particle p-1"></div>
        <div class="particle p-2"></div>
        <div class="particle p-3"></div>
        <div class="particle p-4"></div>
        <div class="particle p-5"></div>
        <div class="particle p-6"></div>
        
        <div class="form-wrapper">
            <div class="form-header">
                <h2 class="form-title">Student PORTAL</h2>
            </div>

            <form id="enrollmentForm">
                <div class="custom-input mb-4">
                    <div class="icon-container"><i class="fa-solid fa-id-badge"></i></div>
                    <input type="text" class="form-control" id="rollNo" placeholder="Enter Roll No. (Primary Key)" onchange="getStudent()">
                    <div class="focus-border"></div>
                </div>

                <div class="custom-input mb-4">
                    <div class="icon-container"><i class="fa-solid fa-user"></i></div>
                    <input type="text" class="form-control" id="fullName" placeholder="Enter Full Name" disabled>
                    <div class="focus-border"></div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-4">
                        <div class="custom-input">
                            <div class="icon-container"><i class="fa-solid fa-chalkboard"></i></div>
                            <input type="text" class="form-control" id="className" placeholder="Enter Class" disabled>
                            <div class="focus-border"></div>
                        </div>
                    </div>
                    <div class="col-md-6 mb-4">
                        <div class="custom-input">
                            <div class="icon-container"><i class="fa-solid fa-calendar-days"></i></div>
                            <input type="text" class="form-control" id="birthDate" placeholder="Select Birth Date" onfocus="(this.type='date')" onblur="if(!this.value) this.type='text'" disabled>
                            <div class="focus-border"></div>
                        </div>
                    </div>
                </div>

                <div class="custom-input mb-4">
                    <div class="icon-container"><i class="fa-solid fa-map-location-dot"></i></div>
                    <input type="text" class="form-control" id="address" placeholder="Enter Complete Address" disabled>
                    <div class="focus-border"></div>
                </div>

                <div class="custom-input mb-5">
                    <div class="icon-container"><i class="fa-solid fa-calendar-check"></i></div>
                    <input type="text" class="form-control" id="enrollDate" placeholder="Select Enrollment Date" onfocus="(this.type='date')" onblur="if(!this.value) this.type='text'" disabled>
                    <div class="focus-border"></div>
                </div>

                <div class="button-group">
                    <button type="button" class="btn-infinity btn-save" id="saveBtn" onclick="saveData()" disabled>
                        <span>SAVE</span> <i class="fa-solid fa-cloud-arrow-up"></i>
                    </button>
                    <button type="button" class="btn-infinity btn-update" id="updateBtn" onclick="updateData()" disabled>
                        <span>UPDATE</span> <i class="fa-solid fa-pen-nib"></i>
                    </button>
                    <button type="button" class="btn-infinity btn-reset" id="resetBtn" onclick="resetForm()" disabled>
                        <span>RESET</span> <i class="fa-solid fa-rotate-right"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
